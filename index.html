<style>
/* ============================================================
   CONFIGURATION — Edit these values for your setup
   ============================================================ */
:root {
  --green:       #4CAF50;
  --green-light: #6ee86e;
  --green-dim:   rgba(76,175,80,0.15);
  --green-border:rgba(76,175,80,0.35);
  --bg:          #0a0f0d;
  --bg-2:        rgba(255,255,255,0.04);
  --bg-3:        rgba(255,255,255,0.07);
  --text:        #e8f0eb;
  --text-muted:  #8fa896;
  --text-dim:    #6a7d6f;
  --text-dimmer: #4a5e50;
  --border:      rgba(255,255,255,0.10);
  --border-dim:  rgba(255,255,255,0.07);
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --font-display:'Syne', sans-serif;
  --font-body:   'DM Sans', sans-serif;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px 80px;
  position: relative;
  overflow-x: hidden;
}

/* Background effects */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(76,175,80,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(76,175,80,0.035) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; top: -150px; right: -150px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(76,175,80,0.10) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 680px;
}

/* Branding strip */
.brand-strip {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding: 0 4px;
}
.brand-logo {
  font-family: var(--font-display); font-size: 18px; font-weight: 800;
  color: var(--green); letter-spacing: 0.01em;
}
.brand-logo span { color: var(--text); }
.brand-url { font-size: 12px; color: var(--text-dimmer); letter-spacing: 0.04em; }

/* ============================================================
   CARD SHELL
   ============================================================ */
.card {
  background: rgba(13,20,15,0.92);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  overflow: hidden;
}

.card-inner { padding: 36px 32px; }

@media (max-width: 520px) {
  .card-inner { padding: 24px 20px; }
  body { padding: 20px 12px 60px; }
}

/* ============================================================
   SCREEN TRANSITIONS
   ============================================================ */
.screen { animation: screenIn 0.38s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   UTILITIES
   ============================================================ */
.tag {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--green-dim); border: 1px solid var(--green-border);
  color: var(--green-light); font-size: 11px; font-weight: 600;
  letter-spacing: 0.09em; text-transform: uppercase;
  padding: 5px 13px; border-radius: 20px; margin-bottom: 22px;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.45; transform: scale(0.7); }
}

h1 {
  font-family: var(--font-display); font-size: clamp(28px,6vw,44px);
  font-weight: 800; line-height: 1.12; color: #fff; margin-bottom: 14px;
}
h1 .accent { color: var(--green); }

h2 {
  font-family: var(--font-display); font-size: clamp(20px,4vw,28px);
  font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.2;
}

p.sub {
  font-size: 15px; color: var(--text-muted); line-height: 1.7;
  margin-bottom: 30px; max-width: 540px;
}

strong { color: var(--text); font-weight: 600; }

/* Divider */
.divider { height: 1px; background: var(--border-dim); margin: 22px 0; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-display); font-weight: 700; font-size: 15px;
  padding: 13px 28px; border-radius: var(--radius-sm); border: none;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
  letter-spacing: 0.015em; text-decoration: none;
}
.btn-primary {
  background: var(--green); color: #071008;
}
.btn-primary:hover  { background: #5bc75f; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(76,175,80,0.25); }
.btn-primary:active { transform: translateY(0); box-shadow: none; }
.btn-primary:disabled { opacity: 0.38; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-ghost {
  background: transparent; color: var(--green-light);
  border: 1px solid rgba(76,175,80,0.35);
  font-family: var(--font-body); font-weight: 500; font-size: 14px;
  padding: 11px 20px;
}
.btn-ghost:hover { background: var(--green-dim); }

.btn-full { width: 100%; }

/* ============================================================
   WELCOME SCREEN
   ============================================================ */
.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 32px;
}
@media (max-width: 420px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}
.stat-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
}
.stat-num {
  font-family: var(--font-display); font-size: 22px; font-weight: 800;
  color: var(--green); line-height: 1;
}
.stat-lbl {
  font-size: 11px; color: var(--text-dimmer);
  text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px;
}

.trust-line {
  display: flex; align-items: center; gap: 8px;
  margin-top: 18px; font-size: 12px; color: var(--text-dimmer);
}
.trust-icon { flex-shrink: 0; opacity: 0.5; }

/* ============================================================
   PROGRESS HEADER
   ============================================================ */
.progress-header { margin-bottom: 24px; }
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.cat-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
}
.cat-strategy { background: rgba(55,138,221,0.13); border: 1px solid rgba(55,138,221,0.28); color: #7ab8f5; }
.cat-ops      { background: rgba(239,159,39,0.13); border: 1px solid rgba(239,159,39,0.28); color: #f5c96a; }
.cat-people   { background: rgba(212,83,126,0.13); border: 1px solid rgba(212,83,126,0.28); color: #f07aaa; }

.step-counter {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  color: var(--green);
}

.prog-track {
  height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden;
}
.prog-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #1a6e1e, var(--green), #7de87d);
  transition: width 0.55s cubic-bezier(0.22,1,0.36,1);
}

/* Section mini-steps */
.section-dots {
  display: flex; gap: 5px; margin-top: 8px;
}
.sdot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.12); transition: background 0.3s;
}
.sdot.done   { background: var(--green); }
.sdot.active { background: rgba(76,175,80,0.5); }

/* ============================================================
   QUESTION CARD
   ============================================================ */
.q-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 26px 24px; margin-bottom: 20px;
}
.q-number {
  font-size: 11px; font-weight: 600; color: var(--text-dimmer);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
}
.q-text {
  font-size: 16px; line-height: 1.65; color: #d4e8d8; font-weight: 400;
}

/* Scale */
.scale-wrap { margin-top: 22px; }
.scale-row {
  display: flex; gap: 10px;
}
.scale-btn {
  flex: 1; min-width: 0; padding: 14px 6px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.18s;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  -webkit-tap-highlight-color: transparent;
}
.scale-btn:hover { background: rgba(76,175,80,0.10); border-color: rgba(76,175,80,0.38); }
.scale-btn.selected {
  background: rgba(76,175,80,0.18); border-color: var(--green);
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(76,175,80,0.15);
}
.scale-n {
  font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff;
  transition: color 0.18s;
}
.scale-btn.selected .scale-n { color: var(--green); }

.scale-legend {
  display: flex; justify-content: space-between; margin-top: 10px;
  font-size: 10px; color: var(--text-dimmer); padding: 0 2px;
}

/* Meter */
.meter {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 20px;
}
.meter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.meter-label {
  font-size: 11px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.08em; font-weight: 600;
}
.meter-pct {
  font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--green);
  transition: color 0.4s;
}
.meter-track {
  height: 7px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;
}
.meter-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.65s cubic-bezier(0.22,1,0.36,1), background 0.65s ease;
}

/* Nav */
.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px;
}

/* ============================================================
   GENERATING SCREEN
   ============================================================ */
.gen-center {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 24px; text-align: center;
}
.spinner {
  width: 72px; height: 72px; margin-bottom: 28px;
  border: 3px solid rgba(76,175,80,0.12);
  border-top: 3px solid var(--green);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.gen-steps {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 20px; width: 100%; max-width: 280px;
}
.gen-step {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-dimmer); opacity: 0.4;
  transition: all 0.4s ease;
}
.gen-step.active { color: var(--text-muted); opacity: 1; }
.gen-step.done   { color: var(--green); opacity: 0.8; }
.gen-step-icon { font-size: 14px; width: 18px; text-align: center; }

/* ============================================================
   LEAD CAPTURE
   ============================================================ */
.form-wrap { position: relative; }

/* Blurred ghost dashboard behind form */
.ghost-dashboard {
  position: absolute; inset: 0; border-radius: var(--radius-lg);
  overflow: hidden; pointer-events: none; z-index: 0;
  filter: blur(5px) saturate(0.7); opacity: 0.35;
}
.ghost-inner {
  padding: 24px; display: flex; flex-direction: column; gap: 12px;
}
.ghost-ring {
  width: 90px; height: 90px; border-radius: 50%;
  border: 8px solid rgba(76,175,80,0.4); margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
}
.ghost-ring-num {
  font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--green);
}
.ghost-bars {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
}
.ghost-bar {
  background: rgba(76,175,80,0.18); border-radius: 6px; height: 54px;
}
.ghost-radar {
  background: rgba(76,175,80,0.08); border-radius: 8px; height: 100px;
}

.form-overlay {
  position: relative; z-index: 2;
  background: rgba(10,15,13,0.92); border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 32px 28px;
}
@media (max-width: 520px) { .form-overlay { padding: 24px 20px; } }

.form-eyebrow {
  font-size: 12px; font-weight: 600; color: var(--green-light);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.11);
  border-radius: var(--radius-sm); padding: 12px 16px;
  color: var(--text); font-family: var(--font-body); font-size: 15px;
  outline: none; transition: border-color 0.22s, background 0.22s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: rgba(76,175,80,0.55); background: rgba(76,175,80,0.04);
}
.field input::placeholder { color: var(--text-dimmer); }
.field input.error { border-color: rgba(226,75,74,0.6); }

.form-privacy {
  font-size: 11px; color: var(--text-dimmer); text-align: center;
  margin-top: 14px; line-height: 1.5;
  display: flex; align-items: flex-start; gap: 6px; justify-content: center;
}

/* Submit state variations */
#submit-btn.loading { opacity: 0.75; cursor: not-allowed; pointer-events: none; }
#submit-btn.success { background: #2d7a30; pointer-events: none; }

/* ============================================================
   RESULTS DASHBOARD
   ============================================================ */

/* Score ring */
.score-section {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 24px; text-align: center;
}
#score-ring { display: block; margin-bottom: 12px; overflow: visible; }

.tier-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-radius: 20px;
  font-family: var(--font-display); font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
}

const CAT_NAMES   = { strategy:'Strategic Vision', ops:'Operational Efficiency', people:'Human Capital' };
const CAT_COLORS  = { strategy:'#378add', ops:'#ef9f27', people:'#d4537e' };

/* ============================================================

let S = {

/* ============================================================
   SCORE HELPERS
   ============================================================ */
function totalScore() {
  const vals = Object.values(S.answers);
  if (!vals.length) return 0;
  return Math.round((vals.reduce((a,b)=>a+b,0) / (vals.length * 5)) * 100);
}

function catScores() {
  const buckets = { strategy:[], ops:[], people:[] };
  QUESTIONS.forEach(q => { if (S.answers[q.id] !== undefined) buckets[q.cat].push(S.answers[q.id]); });
  const out = {};
  for (const k in buckets) {
    const a = buckets[k];
    out[k] = a.length ? Math.round((a.reduce((x,y)=>x+y,0) / (a.length*5)) * 100) : 0;
  }
  return out;
}

function liveMeter() {
  return Object.keys(S.answers).length ? totalScore() : 0;
}

function meterColor(pct) {
  if (pct >= 70) return 'linear-gradient(90deg,#1a6e1e,#4CAF50)';
  if (pct >= 40) return 'linear-gradient(90deg,#8a5c10,#ef9f27)';
  return 'linear-gradient(90deg,#7a1e1e,#e24b4a)';
}

function weakestCat(cs) {
  return Object.entries(cs).sort((a,b)=>a[1]-b[1])[0];
}

function tierInfo(score) {

  const [wk, wv] = weakestCat(cs);

    ctaHeadline: `Address Your ${wName} Friction`,

    weakName: wName,
  };
}

/* ============================================================
   SVG BUILDERS
   ============================================================ */
function buildScoreRing(score) {
  const r = 58, cx = 72, cy = 72, circ = 2 * Math.PI * r;
  const pct = score / 100;
  const dash = circ * pct;
  const color = score >= 70 ? '#4CAF50' : score >= 40 ? '#ef9f27' : '#e24b4a';
  return `
    <svg id="score-ring" width="144" height="144" viewBox="0 0 144 144">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
        stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}"
        stroke-dashoffset="${(circ * 0.25).toFixed(2)}" stroke-linecap="round"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        font-family="Syne,sans-serif" font-size="30" font-weight="800" fill="${color}">${score}</text>
      <text x="${cx}" y="${cy + 22}" text-anchor="middle"
        font-family="DM Sans,sans-serif" font-size="11" fill="#6a7d6f">out of 100</text>
    </svg>`;
}

function buildRadar(cs, ghost) {
  const cx=100, cy=100, r=72;
  const angles = [-90, 30, 150];
  const cats = ['strategy','ops','people'];
  const labels = ['Strategic\nVision', 'Operational\nEfficiency', 'Human\nCapital'];

  const pt = (cat, i) => {
    const frac = ghost ? 0.42 : (cs[cat]||0) / 100;
    const a = angles[i] * Math.PI / 180;
    return [cx + r * frac * Math.cos(a), cy + r * frac * Math.sin(a)];
  };

  const gridPts = (frac) =>
    cats.map((c,i) => {
      const a = angles[i] * Math.PI / 180;
      return `${cx + r * frac * Math.cos(a)},${cy + r * frac * Math.sin(a)}`;
    }).join(' ');

  const dataPts = cats.map((c,i) => pt(c,i).map(v=>v.toFixed(1)).join(',')).join(' ');

  const axisLines = cats.map((c,i) => {
    const a = angles[i] * Math.PI / 180;
    return `<line x1="${cx}" y1="${cy}" x2="${(cx+r*Math.cos(a)).toFixed(1)}" y2="${(cy+r*Math.sin(a)).toFixed(1)}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
  }).join('');

  const dotEls = cats.map((c,i) => {
    const [px,py] = pt(c,i);
    return `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="${ghost ? 'rgba(76,175,80,0.25)' : '#4CAF50'}"/>`;
  }).join('');

  const labelEls = labels.map((lb,i) => {
    const a = angles[i] * Math.PI / 180;
    const lx = (cx + (r+20) * Math.cos(a)).toFixed(1);
    const ly = (cy + (r+20) * Math.sin(a)).toFixed(1);
    const lines = lb.split('\n');
    const tspans = lines.map((l, li) => `<tspan x="${lx}" dy="${li===0?0:13}">${l}</tspan>`).join('');
    return `<text x="${lx}" y="${parseFloat(ly) - (lines.length-1)*6.5}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#6a7d6f">${tspans}</text>`;
  }).join('');

  const color = ghost ? 'rgba(76,175,80,0.22)' : '#4CAF50';
  const fill  = ghost ? 'rgba(76,175,80,0.07)' : 'rgba(76,175,80,0.16)';

  return `
    <svg width="200" height="200" viewBox="0 0 200 200">
      ${[0.25,0.5,0.75,1].map(f=>`<polygon points="${gridPts(f)}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`).join('')}
      ${axisLines}
      <polygon points="${dataPts}" fill="${fill}" stroke="${color}" stroke-width="2"/>
      ${dotEls}
      ${labelEls}
    </svg>`;
}

        <span class="meter-pct" style="color:${meter>=70?'#4CAF50':meter>=40?'#ef9f27':'#e24b4a'}">${meter > 0 ? meter + '%' : '—'}</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill" style="width:${meter}%;background:${mColor}"></div>

    <div class="nav-row">

/* ============================================================
   STATE MACHINE
   ============================================================ */
function mount() {
  const el = document.getElementById('screen-mount');
  if (!el) return;
  if      (S.screen==='welcome')    el.innerHTML = renderWelcome();
  else if (S.screen==='question')   el.innerHTML = renderQuestion();
  else if (S.screen==='generating') el.innerHTML = renderGenerating();
  else if (S.screen==='leadform')   el.innerHTML = renderLeadForm();
  else if (S.screen==='results')    el.innerHTML = renderResults();
  el.scrollIntoView({ behavior:'smooth', block:'start' });
}

function startQuiz() {
  S.screen = 'question';
  S.currentQ = 0;
  S.selectedVal = S.answers[QUESTIONS[0].id] ?? null;
  mount();
}

function selectVal(v) {
  S.selectedVal = v;
  // Re-render just the scale buttons for instant feedback, no full re-mount
  document.querySelectorAll('.scale-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i+1 === v);
  });
  // Update next button
  const nextBtn = document.querySelector('.nav-row .btn-primary');
  if (nextBtn) nextBtn.disabled = false;
}

function nextQ() {
  if (S.selectedVal === null) return;
  S.answers[QUESTIONS[S.currentQ].id] = S.selectedVal;

  if (S.currentQ === 9) {
    // Transition to generating
    S.screen = 'generating';
    S.genStep = 0;
    mount();
    const iv = setInterval(() => {
      S.genStep++;
      const el = document.getElementById('screen-mount');
      if (el) el.innerHTML = renderGenerating();
      if (S.genStep >= 4) {
        clearInterval(iv);
        setTimeout(() => { S.screen = 'leadform'; mount(); }, 500);
      }
    }, 700);
    return;
  }

  S.currentQ++;
  S.selectedVal = S.answers[QUESTIONS[S.currentQ].id] ?? null;
  mount();
}

function prevQ() {
  if (S.currentQ === 0) return;
  S.currentQ--;
  S.selectedVal = S.answers[QUESTIONS[S.currentQ].id] ?? null;
  mount();
}

/* ============================================================
   EMAILJS SUBMISSION
   ============================================================ */
function submitLead() {
  const nameEl    = document.getElementById('f-name');
  const companyEl = document.getElementById('f-company');
  const emailEl   = document.getElementById('f-email');
  const errEl     = document.getElementById('form-error');
  const btn       = document.getElementById('submit-btn');
  const lbl       = document.getElementById('submit-label');

  const phoneEl  = document.getElementById('f-phone');
  const name    = nameEl?.value.trim()    || '';
  const company = companyEl?.value.trim() || '';
  const email   = emailEl?.value.trim()   || '';
  const phone   = phoneEl?.value.trim()   || '';

  // Client-side validation
  let err = '';
  if (!name)                                  err = 'Please enter your full name.';
  else if (!email || !email.includes('@'))    err = 'Please enter a valid corporate email address.';

  if (err) {
    if (errEl) { errEl.textContent = err; errEl.style.display = 'block'; }
    if (!name    && nameEl)  { nameEl.classList.add('error'); nameEl.focus(); }
    if (!email   && emailEl) { emailEl.classList.add('error'); emailEl.focus(); }
    return;
  }

  // Clear errors
  if (errEl) errEl.style.display = 'none';
  [nameEl, companyEl, emailEl].forEach(el => el?.classList.remove('error'));

  // Store lead data
  S.lead = { name, company, email, phone };

  // Update button to loading state
  if (btn)  btn.classList.add('loading');
  if (lbl)  lbl.textContent = 'Sending…';

  const score    = totalScore();
  const cs       = catScores();
  const info     = tierInfo(score);
  const now      = new Date().toLocaleString('en-ZA', { timeZone:'Africa/Johannesburg' });

  // EmailJS template parameters
  const templateParams = {
    to_email:       EMAILJS_CONFIG.notifyEmail,
    name,
    company:        company || 'Not provided',
    email,
    score:          String(score),
    tier:           info.label,
    strategy_score: String(cs.strategy),
    ops_score:      String(cs.ops),
    people_score:   String(cs.people),
    phone:          phone || 'Not provided',
    weak_category:  info.weakName,
    message:        name + ' from ' + (company || 'an unknown company') + ' completed the REV AI Readiness Scorecard and scored ' + score + '% (' + info.label + '). Primary friction point: ' + info.weakName + '. Contact: ' + (phone || 'no phone provided') + '. Recommended action: ' + info.ctaHeadline + '.',
    timestamp:      now,
    reply_to:       email,
  };

  // Check if EmailJS is configured
  const isConfigured = EMAILJS_CONFIG.publicKey !== 'YOUR_PUBLIC_KEY';

  if (isConfigured) {
    emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey });

    emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, templateParams)
      .then(() => {
        if (btn)  { btn.classList.remove('loading'); btn.classList.add('success'); }
        if (lbl)  lbl.textContent = '✓ Submitted — Loading Report…';
        setTimeout(() => { S.screen = 'results'; mount(); }, 700);
      })
      .catch((error) => {
        console.error('EmailJS error:', error);
        // Still show results even if email fails — don't penalise the user
        if (btn)  btn.classList.remove('loading');
        if (lbl)  lbl.textContent = 'Reveal My Score & Report →';
        S.screen = 'results';
        mount();
      });
  } else {
    // EmailJS not yet configured — proceed to results anyway (dev mode)
    console.warn('REV Scorecard: EmailJS not configured. Add your credentials to EMAILJS_CONFIG.');
    setTimeout(() => { S.screen = 'results'; mount(); }, 600);
  }
}

function restartQuiz() {
  S = { screen:'welcome', currentQ:0, answers:{}, selectedVal:null, lead:{name:'',company:'',email:''}, genStep:0 };
  mount();
}
